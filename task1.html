<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <script>
        class PrintMachine {
            constructor(fontSize, color, fontFamily) {
                this.fontSize = fontSize;
                this.color = color;
                this.fontFamily = fontFamily;
            }

            print(text) {
                document.write(`<p>${text}</p>`);
            }
        }

        const printer = new PrintMachine("20px", "blue", "Arial");
        printer.print("Привіт! Цей текст надруковано за допомогою класу PrintMachine.");


        class News {
            constructor(title, text, tags, publishDate) {
                this.title = title;
                this.text = text;
                this.tags = tags;
                this.publishDate = new Date(publishDate);
            }

            getFormattedDate() {
                const now = new Date();
                const diffTime = now - this.publishDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 1) {
                    return "сьогодні";
                } else if (diffDays < 7) {
                    return `${diffDays} днів тому`;
                } else {
                    let day = String(this.publishDate.getDate()).padStart(2, '0');
                    let month = String(this.publishDate.getMonth() + 1).padStart(2, '0');
                    let year = this.publishDate.getFullYear();
                    return `${day}.${month}.${year}`;
                }
            }

            print() {
                const formattedDate = this.getFormattedDate();
                const tagsStr = this.tags.map(tag => `#${tag}`).join(' ');

                document.write(`
                    <div>
                        <h2>${this.title}</h2>
                        <div>${formattedDate}</div>
                        <p>${this.text}</p>
                        <div>${tagsStr}</div>
                    </div>
                `);
            }
        }

        const newsDate = new Date();
        newsDate.setDate(newsDate.getDate() - 2);

        const myNews = new News(
            "What is Lorem Ipsum?",
            "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book.",
            ["lorem", "ipsum", "text"],
            newsDate
        );

        myNews.print();
    </script>


</body>
</html>
