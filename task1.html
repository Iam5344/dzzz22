<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <script>
        const rectangle = {
            topLeft: { x: 2, y: 8 },
            bottomRight: { x: 10, y: 2 }
        };

        function showInfo(rect) {
            alert(`Прямокутник:\nЛіва верхня точка: (${rect.topLeft.x}, ${rect.topLeft.y})\nПрава нижня точка: (${rect.bottomRight.x}, ${rect.bottomRight.y})`);
        }

        function getWidth(rect) {
            return Math.abs(rect.bottomRight.x - rect.topLeft.x);
        }

        function getHeight(rect) {
            return Math.abs(rect.topLeft.y - rect.bottomRight.y);
        }

        function getArea(rect) {
            return getWidth(rect) * getHeight(rect);
        }

        function getPerimeter(rect) {
            return 2 * (getWidth(rect) + getHeight(rect));
        }

        function changeWidth(rect, value) {
            rect.bottomRight.x += value;
        }

        function changeHeight(rect, value) {
            rect.bottomRight.y -= value;
        }

        function changeDimensions(rect, widthValue, heightValue) {
            changeWidth(rect, widthValue);
            changeHeight(rect, heightValue);
        }

        function shiftX(rect, value) {
            rect.topLeft.x += value;
            rect.bottomRight.x += value;
        }

        function shiftY(rect, value) {
            rect.topLeft.y += value;
            rect.bottomRight.y += value;
        }

        function shiftXY(rect, xValue, yValue) {
            shiftX(rect, xValue);
            shiftY(rect, yValue);
        }

        function isPointInside(rect, x, y) {
            return x >= rect.topLeft.x && x <= rect.bottomRight.x && y >= rect.bottomRight.y && y <= rect.topLeft.y;
        }

        showInfo(rectangle);

        console.log("Ширина:", getWidth(rectangle));
        console.log("Висота:", getHeight(rectangle));
        console.log("Площа:", getArea(rectangle));
        console.log("Периметр:", getPerimeter(rectangle));

        changeWidth(rectangle, 5);
        changeHeight(rectangle, 2);
        console.log("Після зміни розмірів:", rectangle);

        shiftX(rectangle, 3);
        shiftY(rectangle, -1);
        console.log("Після зсуву:", rectangle);

        let checkX = parseFloat(prompt("Введіть X точки для перевірки:"));
        let checkY = parseFloat(prompt("Введіть Y точки для перевірки:"));
        let inside = isPointInside(rectangle, checkX, checkY);
        alert(`Точка всередині прямокутника? ${inside ? "Так" : "Ні"}`);
    </script>
</body>
</html>
